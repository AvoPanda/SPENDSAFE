// ─── Helpers ───
const fmt = (n) => (n < 0 ? "-" : "") + "$" + Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
const fmtShort = (n) => (n < 0 ? "-" : "") + "$" + (Math.abs(n) >= 1000 ? (Math.abs(n)/1000).toFixed(1) + "k" : Math.abs(n).toFixed(0));

function buildForecast(sb, ev) {
  let b = sb; const pts = []; const m = {};
  ev.forEach(e => { if (!m[e.day]) m[e.day] = []; m[e.day].push(e); });
  for (let d = 0; d <= 30; d++) {
    const de = m[d] || [];
    de.forEach(e => { b += e.amount; });
    const dt = addDays(TODAY, d);
    pts.push({ day: d, balance: Math.round(b * 100) / 100, label: fmtDate(dt), dow: fmtDay(dt), events: de.filter(e => e.type !== "spend") });
  }
  return pts;
}

// ─── Monthly safe-to-spend from forecast ───
function calcMonthly(forecastPoints) {
  // Sum all income over 30 days, subtract all bills, gives net available for the month
  let totalIncome = 0, totalBills = 0;
  forecastPoints.forEach(p => {
    p.events.forEach(e => {
      if (e.type === "income") totalIncome += e.amount;
    });
  });
  // Also count bill events from the raw forecast
  forecastPoints.forEach(p => {
    p.events.forEach(e => {
      if (e.type === "bill") totalBills += Math.abs(e.amount);
    });
  });
  const endBal = forecastPoints[30]?.balance || 0;
  const startBal = forecastPoints[0]?.balance || 0;
  // Monthly safe-to-spend = current balance + all incoming income - all bills over 30 days
  // This represents total discretionary money over the month
  return Math.max(startBal + totalIncome - totalBills, 0);
}

// ─── Forecast Chart ───
function ForecastChart({ data, points }) {
  const T = useT();
  const [hover, setHover] = useState(null);
  const [aP, setAP] = useState(0);
  const ref = useRef(null);
  useEffect(() => { let s = null; const d = 1200; const st = (t) => { if (!s) s = t; const p = Math.min((t - s) / d, 1); setAP(p * p * (3 - 2 * p)); if (p < 1) requestAnimationFrame(st); }; requestAnimationFrame(st); }, [data.name]);
  const W = 380, H = 220, PL = 48, PR = 12, PT = 28, PB = 38, cW = W - PL - PR, cH = H - PT - PB;
  const vals = points.map(p => p.balance);
  const maxV = Math.max(...vals) * 1.08, minV = Math.min(...vals, 0) * (Math.min(...vals) < 0 ? 1.15 : 0.85), rng = maxV - minV || 1;
  const x = (i) => PL + (i / 30) * cW, y = (v) => PT + cH - ((v - minV) / rng) * cH;
  const li = vals.indexOf(Math.min(...vals)), lp = points[li];
  const lnPts = points.map((p, i) => `${x(i)},${y(p.balance)}`).join(" ");
  const area = `M ${x(0)},${y(points[0].balance)} ` + points.map((p, i) => `L ${x(i)},${y(p.balance)}`).join(" ") + ` L ${x(30)},${y(minV)} L ${x(0)},${y(minV)} Z`;
  const mk = []; points.forEach((p, i) => { p.events.forEach(e => { mk.push({ i, x: x(i), y: y(p.balance), event: e, balance: p.balance, label: p.label }); }); });
  const gC = 4, gL = Array.from({ length: gC + 1 }, (_, i) => { const v = minV + (rng / gC) * i; return { v, y: y(v) }; });
  const xL = [0, 5, 10, 15, 20, 25, 30].map(d => ({ d, x: x(d), label: points[d]?.label || "" }));
  const hMM = useCallback((e) => { if (!ref.current) return; const r = ref.current.getBoundingClientRect(); const idx = Math.round(((((e.clientX - r.left) * (W / r.width)) - PL) / cW) * 30); if (idx >= 0 && idx <= 30) setHover(idx); else setHover(null); }, []);
  const hT = useCallback((e) => { if (!ref.current) return; const r = ref.current.getBoundingClientRect(); const idx = Math.round((((e.touches[0].clientX - r.left) * (W / r.width) - PL) / cW) * 30); if (idx >= 0 && idx <= 30) setHover(idx); }, []);
  return (
    <svg ref={ref} viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block", cursor: "crosshair" }} onMouseMove={hMM} onMouseLeave={() => setHover(null)} onTouchMove={hT} onTouchEnd={() => setHover(null)}>
      <defs>
        <linearGradient id="aG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={T.accent} stopOpacity="0.25" /><stop offset="100%" stopColor={T.accent} stopOpacity="0.02" /></linearGradient>
        <linearGradient id="lG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor={T.accent} /><stop offset="100%" stopColor={T.primary} /></linearGradient>
        <filter id="gl"><feGaussianBlur stdDeviation="3" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
        <clipPath id="aC"><rect x="0" y="0" width={PL + cW * aP} height={H} /></clipPath>
      </defs>
      {gL.map((g, i) => (<g key={i}><line x1={PL} y1={g.y} x2={W - PR} y2={g.y} stroke={T.border} strokeWidth="0.5" strokeDasharray="3,3" /><text x={PL - 6} y={g.y + 4} fill={T.textMut} fontSize="9" textAnchor="end" fontFamily="'DM Sans',sans-serif">{fmtShort(g.v)}</text></g>))}
      {xL.map(xl => (<text key={xl.d} x={xl.x} y={H - 8} fill={T.textMut} fontSize="8.5" textAnchor="middle" fontFamily="'DM Sans',sans-serif">{xl.label}</text>))}
      <g clipPath="url(#aC)"><path d={area} fill="url(#aG)" /><polyline points={lnPts} fill="none" stroke="url(#lG)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" filter="url(#gl)" /></g>
      {minV < 0 && <line x1={PL} y1={y(0)} x2={W - PR} y2={y(0)} stroke={T.danger} strokeWidth="1" strokeDasharray="4,4" opacity="0.5" />}
      <g clipPath="url(#aC)">{mk.map((m, idx) => { const isI = m.event.type === "income"; const c = isI ? T.primary : T.danger; return (<g key={idx}><line x1={m.x} y1={PT} x2={m.x} y2={H - PB} stroke={c} strokeWidth="0.8" strokeDasharray="2,3" opacity="0.4" /><circle cx={m.x} cy={m.y} r="5" fill={T.bg} stroke={c} strokeWidth="2" /><circle cx={m.x} cy={m.y} r="2" fill={c} /></g>); })}</g>
      <g clipPath="url(#aC)">
        <line x1={x(li)} y1={y(lp.balance) + 6} x2={x(li)} y2={y(lp.balance) + 22} stroke={T.danger} strokeWidth="1.5" />
        <rect x={x(li) - 42} y={y(lp.balance) + 22} width="84" height="22" rx="6" fill={T.danger} />
        <text x={x(li)} y={y(lp.balance) + 37} fill="#fff" fontSize="10" fontWeight="700" textAnchor="middle" fontFamily="'DM Sans',sans-serif">LOW: {fmtShort(lp.balance)}</text>
        <circle cx={x(li)} cy={y(lp.balance)} r="6" fill={T.danger} opacity="0.3"><animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite" /><animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite" /></circle>
        <circle cx={x(li)} cy={y(lp.balance)} r="4" fill={T.bg} stroke={T.danger} strokeWidth="2" />
      </g>
      {hover !== null && points[hover] && (<g>
        <line x1={x(hover)} y1={PT} x2={x(hover)} y2={H - PB} stroke={T.textSec} strokeWidth="0.8" strokeDasharray="2,2" />
        <circle cx={x(hover)} cy={y(points[hover].balance)} r="5" fill={T.accent} stroke={T.bg} strokeWidth="2" />
        <rect x={Math.min(x(hover) - 50, W - PR - 100)} y={Math.max(y(points[hover].balance) - 42, 2)} width="100" height="32" rx="6" fill={T.surface} stroke={T.border} strokeWidth="1" />
        <text x={Math.min(x(hover) - 50, W - PR - 100) + 50} y={Math.max(y(points[hover].balance) - 42, 2) + 14} fill={T.textSec} fontSize="8.5" textAnchor="middle" fontFamily="'DM Sans',sans-serif">{points[hover].dow} {points[hover].label}</text>
        <text x={Math.min(x(hover) - 50, W - PR - 100) + 50} y={Math.max(y(points[hover].balance) - 42, 2) + 27} fill={T.text} fontSize="11" fontWeight="700" textAnchor="middle" fontFamily="'DM Sans',sans-serif">{fmt(points[hover].balance)}</text>
      </g>)}
    </svg>
  );
}

// ─── Main App ───
function SpendSafe() {
  const [persona, setPersona] = useState(null);
  const [tab, setTab] = useState("home");
  const [tf, setTf] = useState("Weekly");
  const [showQL, setShowQL] = useState(false);
  const [showAB, setShowAB] = useState(false);
  const [showAS, setShowAS] = useState(false);
  const [showAG, setShowAG] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [fundingGoal, setFundingGoal] = useState(null);
  const [editingBill, setEditingBill] = useState(null);
  const [darkMode, setDarkMode] = useState(true);
  const [toast, setToast] = useState(null);
  const [txs, setTxs] = useState([]);
  const [bills, setBills] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [spending, setSpending] = useState({});
  const [goals, setGoals] = useState([]);
  const [sts, setSts] = useState(0);
  const [mounted, setMounted] = useState(false);
  useEffect(() => { setMounted(true); }, []);

  const T = darkMode ? DARK : LIGHT;
  const pctColor = (p) => p >= 80 ? T.danger : p >= 60 ? T.warning : T.primary;

  const load = (p) => {
    const d = p === 1 ? P1 : P2;
    setTxs(d.transactions.map(tx => ({ ...tx, date: relDate(tx.daysAgo) })));
    setBills(d.bills.map(b => ({ ...b, date: fmtDate(addDays(TODAY, b.daysUntil)) })));
    setAlerts([...d.alerts]);
    setSpending(JSON.parse(JSON.stringify(d.spending))); setSts(d.safeToSpend);
    setGoals(d.goals.map(g => ({ ...g }))); setPersona(p); setTab("home"); setTf("Weekly"); setShowSettings(false);
  };

  const data = persona === 1 ? P1 : P2;
  const flash = (m) => { setToast(m); setTimeout(() => setToast(null), 2500); };
  const handleLog = (tx) => {
    setTxs(p => [tx, ...p]);
    if (tx.amount < 0) { setSts(p => Math.max(0, p + tx.amount)); if (tx.category && spending[tx.category]) { setSpending(prev => { const c = { ...prev[tx.category] }; c.spent = +(c.spent + Math.abs(tx.amount)).toFixed(2); c.pct = Math.round((c.spent / c.limit) * 100); if (c.pct >= 70) { setAlerts(a => [{ type: c.pct >= 90 ? "danger" : "warning", msg: `${tx.category} is at ${c.pct}% of your ${fmt(c.limit)} limit`, time: "Just now" }, ...a]); flash(`⚠️ ${tx.category}: ${c.pct}% of limit`); } return { ...prev, [tx.category]: c }; }); } } else { setSts(p => p + tx.amount); }
    flash(`✓ ${tx.name} ${fmt(tx.amount)}`);
  };
  const handleAddBill = (b) => { setBills(p => [...p, { ...b, date: fmtDate(addDays(TODAY, b.daysUntil)) }]); setSts(p => Math.max(0, p - b.amount)); flash(`✓ Bill: ${b.name}`); };
  const handleDeleteBill = (i) => { const b = bills[i]; setBills(p => p.filter((_, idx) => idx !== i)); if (!b.paid) { setSts(p => p + b.amount); } flash(`✗ Removed: ${b.name}`); };
  const handleTogglePaid = (i) => { setBills(p => p.map((b, idx) => idx === i ? { ...b, paid: !b.paid } : b)); };
  const handleAddGoal = (g) => { setGoals(p => [...p, g]); flash(`✓ Goal: ${g.name}`); };
  const handleEditBill = (idx, updated) => {
    const oldAmt = bills[idx].amount;
    const diff = updated.amount - oldAmt;
    setBills(p => p.map((b, i) => i === idx ? updated : b));
    if (!bills[idx].paid) { setSts(p => Math.max(0, p - diff)); }
    flash(`✓ Updated: ${updated.name}`);
  };
  const handleFundGoal = (goalIdx, amount) => {
    setGoals(p => p.map((g, i) => i === goalIdx ? { ...g, saved: Math.min(g.saved + amount, g.target) } : g));
    setSts(p => Math.max(0, p - amount));
    flash(`✓ Moved ${fmt(amount)} to savings`);
  };

  const forecastPoints = useMemo(() => buildForecast(data.balance, data.forecastEvents), [persona]);

  // Monthly: current safe-to-spend + all income over 30 days - all current unpaid bills
  const monthlyAvailable = useMemo(() => {
    // Sum income from forecast events
    let totalIncome = 0;
    forecastPoints.forEach(p => { p.events.forEach(e => { if (e.type === "income") totalIncome += e.amount; }); });
    // Sum unpaid bills from current state
    const totalUnpaidBills = bills.filter(b => !b.paid).reduce((s, b) => s + b.amount, 0);
    return Math.max(sts + totalIncome - totalUnpaidBills, 0);
  }, [forecastPoints, bills, sts]);

  // Smart time frame calculations
  // Daily budget is locked: initial safe-to-spend / days until pay (doesn't recalculate when you spend today)
  const initialSts = persona === 1 ? P1.safeToSpend : P2.safeToSpend;
  const dailyBudget = +(initialSts / Math.max(data.daysUntilPay, 1)).toFixed(2);
  // Track ALL spending today — both pre-loaded and newly logged transactions
  const spentToday = txs.filter(tx => tx.date === fmtDate(TODAY) && tx.amount < 0).reduce((s, tx) => s + Math.abs(tx.amount), 0);
  const dailyRemaining = Math.max(dailyBudget - spentToday, 0);
  const frameAmt = tf === "Daily" ? +dailyRemaining.toFixed(2) : tf === "Monthly" ? +monthlyAvailable.toFixed(2) : sts;
  const frameDays = tf === "Daily" ? 1 : tf === "Monthly" ? 30 : data.daysUntilPay;
  const frameDaysLabel = tf === "Daily" ? "Today" : tf === "Monthly" ? "This Month" : data.daysUntilPay + " Days Left";
  // Per Day: on Daily tab show what's left today, on other tabs show the daily budget
  const framePerDay = tf === "Daily" ? dailyRemaining : dailyBudget;

  const currentMonth = MONTHS[TODAY.getMonth()] + " " + TODAY.getFullYear();

  const css = `@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap');*{box-sizing:border-box;margin:0;padding:0}body{background:${T.bg};transition:background .35s}@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}button:active{transform:scale(0.97)}`;

  if (persona === null) {
    return (<ThemeCtx.Provider value={T}><div style={{ maxWidth: 420, margin: "0 auto", minHeight: "100vh", background: T.bg, fontFamily: "'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 24px", color: T.text, transition: "background .35s,color .35s" }}>
      <style>{css}</style>
      <div style={{ opacity: mounted ? 1 : 0, transform: mounted ? "none" : "translateY(16px)", transition: "all .7s", textAlign: "center" }}>
        <div style={{ marginBottom: 20, display: "flex", justifyContent: "center" }}>{I.shield}</div>
        <h1 style={{ fontSize: 30, fontWeight: 700, marginBottom: 6, letterSpacing: "-0.02em" }}>Spend<span style={{ color: T.primary }}>Safe</span></h1>
        <p style={{ fontSize: 14, color: T.textSec, lineHeight: 1.6, marginBottom: 24 }}>Know what you can spend — not just what's in your account.</p>
        <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 24, alignItems: "center" }}><span style={{ color: T.textMut }}>{I.sun}</span><Toggle on={darkMode} onToggle={() => setDarkMode(d => !d)} /><span style={{ color: T.textMut }}>{I.moon}</span></div>
        <div style={{ fontSize: 11, color: T.textMut, marginBottom: 12, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600 }}>Select a Persona</div>
        {[{ p: 1, name: "Marcus — The Blind Spender", sub: "Server, 22 · Tip-based income · No budget system" }, { p: 2, name: "Diana — The Careful Calculator", sub: "Salaried manager, 23 · Weekly pay · Calendar & mental math" }].map(({ p, name, sub }) => (<button key={p} onClick={() => load(p)} style={{ width: "100%", padding: "16px 18px", borderRadius: 13, border: `1px solid ${T.border}`, background: T.card, color: T.text, cursor: "pointer", textAlign: "left", marginBottom: 10, transition: "background .3s,border-color .3s" }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><div><div style={{ fontSize: 15, fontWeight: 700, marginBottom: 3 }}>{name}</div><div style={{ fontSize: 11.5, color: T.textSec }}>{sub}</div></div><span style={{ color: T.textMut }}>{I.chevron}</span></div></button>))}
      </div>
    </div></ThemeCtx.Provider>);
  }

  return (<ThemeCtx.Provider value={T}>
    <div style={{ maxWidth: 420, margin: "0 auto", minHeight: "100vh", background: T.bg, fontFamily: "'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif", paddingBottom: 68, color: T.text, position: "relative", transition: "background .35s,color .35s" }}>
      <style>{css}</style>

      {toast && (<div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", background: T.card, color: T.text, padding: "10px 22px", borderRadius: 11, fontSize: 12, fontWeight: 600, zIndex: 300, border: `1px solid ${T.border}`, boxShadow: T.shadow, animation: "fadeIn .3s" }}>{toast}</div>)}

      <div style={{ padding: "14px 14px 10px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${T.border}` }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <button onClick={() => setPersona(null)} style={{ background: "none", border: "none", color: T.textMut, cursor: "pointer", padding: 3 }}>{I.back}</button>
          <div><div style={{ fontSize: 9, color: T.textMut, textTransform: "uppercase", letterSpacing: "0.1em" }}>{persona === 1 ? "Scenario 1" : "Scenario 2"}</div><div style={{ fontSize: 15, fontWeight: 700 }}>Hi, {data.name} <span style={{ fontSize: 13, fontWeight: 400, color: T.textSec }}>· {fmt(data.balance)}</span></div></div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => setShowSettings(true)} style={{ width: 36, height: 36, borderRadius: 10, border: `1px solid ${T.border}`, background: T.card, color: T.textSec, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>{I.settings}</button>
          <button onClick={() => setShowQL(true)} style={{ width: 36, height: 36, borderRadius: 10, border: "none", background: T.primary, color: "#000", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>{I.plus}</button>
        </div>
      </div>

      {/* HOME */}
      {tab === "home" && (<div style={{ animation: "fadeIn .35s" }}>
        <TimeFrame selected={tf} onChange={setTf} />
        <Ring amount={frameAmt} total={data.balance} daysLeft={frameDays} daysLabel={frameDaysLabel} nextPay={data.nextPaycheck} perDay={framePerDay} />
        <div style={{ padding: "18px 14px 6px" }}><div style={{ fontSize: 12, fontWeight: 600, color: T.textMut, textTransform: "uppercase", letterSpacing: "0.08em" }}>Recent Transactions</div></div>
        <div style={{ background: T.surface, borderRadius: 11, margin: "0 11px", overflow: "hidden", border: `1px solid ${T.border}` }}>
          {txs.slice(0, 5).map((tx, i) => (<div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 14px", borderBottom: `1px solid ${T.border}` }}>
            <div style={{ width: 34, height: 34, borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", background: tx.amount > 0 ? T.primaryGlow : T.cardHover, fontSize: 15 }}>{catIcons[tx.category] || "📦"}</div>
            <div style={{ flex: 1 }}><div style={{ fontSize: 13, fontWeight: 500, color: T.text }}>{tx.name}</div><div style={{ fontSize: 10, color: T.textMut }}>{tx.date} · {tx.time}</div></div>
            <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'DM Sans',sans-serif", color: tx.amount > 0 ? T.primary : T.text }}>{tx.amount > 0 ? "+" : ""}{fmt(tx.amount)}</div>

            <div key={i} style={{ background: T.card, borderRadius: 13, padding: "14px 16px", border: `1px solid ${done ? T.primary + "40" : T.border}`, transition: "background .3s" }}>

                <div style={{ textAlign: "right" }}><div style={{ fontSize: 15, fontWeight: 700, color: T.primary, fontFamily: "'DM Sans',sans-serif" }}>{fmt(g.saved)}</div><div style={{ fontSize: 10, color: T.textSec }}>of {fmt(g.target)}</div></div>
              </div>

              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 6 }}>

                {!done && <button onClick={() => setFundingGoal(i)} style={{ padding: "4px 10px", borderRadius: 6, border: `1px solid ${T.primary}`, background: T.primaryGlow, color: T.primary, fontSize: 11, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 3 }}>{I.fund} Add Funds</button>}

        {(() => { const v = forecastPoints.map(p => p.balance); const lv = Math.min(...v); const ld = forecastPoints[v.indexOf(lv)]; const hv = Math.max(...v); const ev = forecastPoints[30].balance; return (<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, padding: "12px 14px" }}>
          <div style={{ background: T.dangerGlow, borderRadius: 11, padding: "12px 10px", border: "1px solid rgba(239,68,68,0.2)", textAlign: "center" }}><div style={{ fontSize: 9, color: T.danger, textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 600, marginBottom: 4 }}>Lowest Point</div><div style={{ fontSize: 17, fontWeight: 700, color: T.danger, fontFamily: "'DM Sans',sans-serif" }}>{fmtShort(lv)}</div><div style={{ fontSize: 10, color: T.textMut, marginTop: 2 }}>{ld.dow} {ld.label}</div></div>
          <div style={{ background: T.primaryGlow, borderRadius: 11, padding: "12px 10px", border: "1px solid rgba(34,197,94,0.2)", textAlign: "center" }}><div style={{ fontSize: 9, color: T.primary, textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 600, marginBottom: 4 }}>Peak Balance</div><div style={{ fontSize: 17, fontWeight: 700, color: T.primary, fontFamily: "'DM Sans',sans-serif" }}>{fmtShort(hv)}</div></div>
          <div style={{ background: T.accentGlow, borderRadius: 11, padding: "12px 10px", border: "1px solid rgba(129,140,248,0.2)", textAlign: "center" }}><div style={{ fontSize: 9, color: T.accent, textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 600, marginBottom: 4 }}>Day 30</div><div style={{ fontSize: 17, fontWeight: 700, color: T.accent, fontFamily: "'DM Sans',sans-serif" }}>{fmtShort(ev)}</div></div>
        </div>); })()}
        <div style={{ padding: "4px 8px" }}><ForecastChart data={data} points={forecastPoints} /></div>
        <div style={{ display: "flex", gap: 16, justifyContent: "center", padding: "4px 0 12px" }}>{[{ col: T.primary, label: "Income" }, { col: T.danger, label: "Bill" }, { col: T.accent, label: "Balance" }].map(l => (<div key={l.label} style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 8, height: 8, borderRadius: 4, background: l.col }} /><span style={{ fontSize: 10, color: T.textSec }}>{l.label}</span></div>))}</div>
        <div style={{ padding: "4px 14px 6px" }}><div style={{ fontSize: 12, fontWeight: 600, color: T.textMut, textTransform: "uppercase", letterSpacing: "0.08em" }}>Upcoming Events</div></div>
        <ForecastEventList points={forecastPoints} /><div style={{ height: 12 }} />
      </div>)}

      {/* SPENDING */}
      {tab === "spending" && (<div style={{ animation: "fadeIn .35s" }}>
        <div style={{ padding: "18px 14px 6px", display: "flex", justifyContent: "space-between", alignItems: "center" }}><div><div style={{ fontSize: 17, fontWeight: 700, color: T.text }}>Spending</div><div style={{ fontSize: 11, color: T.textSec }}>{currentMonth}</div></div><button onClick={() => setShowAS(true)} style={{ padding: "7px 12px", borderRadius: 7, border: `1px solid ${T.border}`, background: T.card, color: T.textSec, fontSize: 11, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>{I.bell} Set Alert</button></div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, padding: "10px 14px" }}>
          {Object.entries(spending).map(([n, d]) => (<div key={n} style={{ background: T.card, borderRadius: 12, padding: "14px", border: `1px solid ${T.border}`, display: "flex", flexDirection: "column", alignItems: "center" }}>
            <div style={{ position: "relative", width: 56, height: 56, marginBottom: 7 }}><svg width="56" height="56" viewBox="0 0 56 56" style={{ transform: "rotate(-90deg)" }}><circle cx="28" cy="28" r="22" fill="none" stroke={T.ringTrack} strokeWidth="5" /><circle cx="28" cy="28" r="22" fill="none" stroke={pctColor(d.pct)} strokeWidth="5" strokeDasharray={2*Math.PI*22} strokeDashoffset={(2*Math.PI*22)*(1-d.pct/100)} strokeLinecap="round" style={{ transition: "all .8s" }} /></svg><div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, color: pctColor(d.pct) }}>{d.pct}%</div></div>
            <div style={{ fontSize: 12, fontWeight: 600, color: T.text, textAlign: "center" }}>{n}</div><div style={{ fontSize: 10, color: T.textSec }}>{fmt(d.spent)} / {fmt(d.limit)}</div>
          </div>))}
        </div>
        <div style={{ padding: "6px 14px" }}><div style={{ fontSize: 12, fontWeight: 600, color: T.textMut, textTransform: "uppercase", letterSpacing: "0.08em" }}>Details</div></div>
        <div style={{ background: T.surface, borderRadius: 11, margin: "0 11px", overflow: "hidden", border: `1px solid ${T.border}` }}>
          {Object.entries(spending).map(([n, d]) => (<div key={n} style={{ padding: "12px 14px", borderBottom: `1px solid ${T.border}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}><span style={{ fontSize: 13, fontWeight: 500, color: T.text }}>{n}</span><span style={{ fontSize: 12, color: T.textSec }}>{fmt(d.spent)} / {fmt(d.limit)}</span></div>
            <div style={{ height: 7, borderRadius: 4, background: T.ringTrack, overflow: "hidden" }}><div style={{ height: "100%", borderRadius: 4, width: `${Math.min(d.pct, 100)}%`, background: pctColor(d.pct), transition: "width .8s" }} /></div>
            <div style={{ fontSize: 10, color: pctColor(d.pct), marginTop: 3, fontWeight: 600 }}>{d.pct}% used</div>
          </div>))}
        </div>
      </div>)}

      {/* ALERTS */}
      {tab === "alerts" && (<div style={{ animation: "fadeIn .35s" }}>
        <div style={{ padding: "18px 14px 6px", display: "flex", justifyContent: "space-between", alignItems: "center" }}><div style={{ fontSize: 17, fontWeight: 700, color: T.text }}>Notifications</div><button onClick={() => setShowAS(true)} style={{ padding: "7px 12px", borderRadius: 7, border: "none", background: T.primary, color: "#000", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>+ New Alert</button></div>
        <div style={{ background: T.surface, borderRadius: 11, margin: "10px 11px", overflow: "hidden", border: `1px solid ${T.border}` }}>
          {alerts.length === 0 ? (<div style={{ padding: 36, textAlign: "center", color: T.textMut, fontSize: 13 }}>No alerts yet.</div>) : alerts.map((a, i) => { const cols = { warning: T.warning, danger: T.danger, info: T.accent }; const bgs = { warning: T.warningGlow, danger: T.dangerGlow, info: T.accentGlow }; return (<div key={i} style={{ padding: "12px 14px", borderBottom: `1px solid ${T.border}`, background: bgs[a.type], borderLeft: `3px solid ${cols[a.type]}` }}><div style={{ fontSize: 12.5, fontWeight: 500, color: T.text, lineHeight: 1.4 }}>{a.msg}</div><div style={{ fontSize: 10, color: T.textMut, marginTop: 3, display: "flex", alignItems: "center", gap: 4 }}>{I.clock} {a.time}</div></div>); })}
        </div>
      </div>)}

      {/* BILLS */}
      {tab === "bills" && (<div style={{ animation: "fadeIn .35s" }}>
        <div style={{ padding: "18px 14px 6px", display: "flex", justifyContent: "space-between", alignItems: "center" }}><div><div style={{ fontSize: 17, fontWeight: 700, color: T.text }}>Upcoming Bills</div><div style={{ fontSize: 11, color: T.textSec }}>Total: {fmt(bills.reduce((s, b) => s + b.amount, 0))}</div></div><button onClick={() => setShowAB(true)} style={{ padding: "7px 12px", borderRadius: 7, border: "none", background: T.primary, color: "#000", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>+ Add Bill</button></div>
        <div style={{ background: T.surface, borderRadius: 11, margin: "10px 11px", overflow: "hidden", border: `1px solid ${T.border}` }}>
          {bills.map((b, i) => (<div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", borderBottom: `1px solid ${T.border}`, opacity: b.paid ? 0.7 : 1 }}>
            <button onClick={() => handleTogglePaid(i)} style={{ width: 28, height: 28, borderRadius: 8, border: `2px solid ${b.paid ? T.primary : T.border}`, background: b.paid ? T.primaryGlow : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: T.primary, flexShrink: 0, fontSize: 14 }}>{b.paid ? I.check : ""}</button>
            <div style={{ fontSize: 18, flexShrink: 0 }}>{b.icon}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 500, color: T.text, textDecoration: b.paid ? "line-through" : "none" }}>{b.name}</div>
              <div style={{ fontSize: 10, color: T.textMut }}>Due {b.date}</div>
            </div>
            <div style={{ textAlign: "right", marginRight: 4 }}><div style={{ fontSize: 14, fontWeight: 600, color: T.text }}>{fmt(b.amount)}</div><div style={{ fontSize: 9, color: b.paid ? T.primary : T.warning, fontWeight: 600 }}>{b.paid ? "Paid" : "Upcoming"}</div></div>
            <button onClick={() => setEditingBill(i)} style={{ background: "none", border: "none", color: T.textMut, cursor: "pointer", padding: 4, flexShrink: 0, opacity: 0.6 }}>{I.edit}</button>
            <button onClick={() => handleDeleteBill(i)} style={{ background: "none", border: "none", color: T.textMut, cursor: "pointer", padding: 4, flexShrink: 0, opacity: 0.6 }}>{I.trash}</button>
          </div>))}
        </div>
      </div>)}

      <Nav tab={tab} setTab={setTab} />
      {showQL && <QuickLog onClose={() => setShowQL(false)} onLog={handleLog} spending={spending} />}
      {showAB && <AddBill onClose={() => setShowAB(false)} onAdd={handleAddBill} />}
      {showAS && <AlertSetup onClose={() => setShowAS(false)} categories={spending} onSave={(c, t) => flash(`✓ Alert: ${c} at ${t}%`)} />}
      {showAG && <AddGoalModal onClose={() => setShowAG(false)} onAdd={handleAddGoal} />}
      {fundingGoal !== null && <FundGoalModal onClose={() => setFundingGoal(null)} goal={goals[fundingGoal]} onFund={(amt) => handleFundGoal(fundingGoal, amt)} />}
      {editingBill !== null && <EditBillModal onClose={() => setEditingBill(null)} bill={bills[editingBill]} onSave={(updated) => handleEditBill(editingBill, updated)} />}
      {showSettings && <SettingsPanel onClose={() => setShowSettings(false)} persona={persona} spending={spending} darkMode={darkMode} onToggleDark={() => setDarkMode(d => !d)} />}
    </div>
  </ThemeCtx.Provider>);
}


    ReactDOM.createRoot(document.getElementById("root")).render(<SpendSafe />);
  </script>
</body>
</html>
